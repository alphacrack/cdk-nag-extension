name: Bug report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix it quickly.

        ⚠️ **Security issues**: Do NOT report security vulnerabilities here. Please follow our [Security Policy](../blob/main/SECURITY.md) instead.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run "CDK NAG: Validate Workspace", the extension...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a CDK project with...
        2. Run command...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Extension configuration
      description: Your `cdkNagValidator.*` settings (redact anything sensitive).
      render: json
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: e.g. 1.96.2
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Output from the "CDK NAG Validator" output channel or the Developer Tools console (Help → Toggle Developer Tools).
      render: shell
