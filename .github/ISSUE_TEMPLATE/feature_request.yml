name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please check the [open issues](../issues) and [BACKLOG.md](../blob/main/BACKLOG.md) first to see if it's already planned.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or friction you're experiencing.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to contribute this feature?
      options:
        - "Yes, I'd like to implement it"
        - "Yes, with some guidance"
        - "No, just suggesting"
    validations:
      required: true
