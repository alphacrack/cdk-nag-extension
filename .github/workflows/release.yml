name: Release

# Tag-triggered release — publishing is decoupled from merging to main.
# Cut a release by tagging a commit: `git tag v0.2.0 && git push origin v0.2.0`.
# The workflow runs the full test battery, packages the VSIX, attaches it to a
# GitHub Release, and publishes to the VS Code Marketplace via `vsce publish`.
#
# Safety properties:
#   * Runs only on semver-shaped tags (v*.*.*) — hand-typed `latest` or
#     `nightly` tags will not trigger a publish.
#   * The full test matrix gates the publish step. A failed test aborts the job
#     before any asset is uploaded or published.
#   * VSCE_PAT is a GitHub secret; rotate it independently of the source repo.
#   * The GitHub Release is created with `--generate-notes` so the changelog
#     draft is seeded from commit messages; the packaged VSIX is attached so
#     users can install without the Marketplace too.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed for `gh release create`

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, test, package, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so `gh release create --generate-notes` sees prior tags

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION. Bump package.json before tagging."
            exit 1
          fi
          echo "Tag and package.json agree on version $PKG_VERSION."

      - name: Run full test suite (lint, compile, unit, jest, functional, integration)
        run: xvfb-run -a npm run test:all

      - name: Package VSIX
        run: npm run package

      - name: Locate VSIX artifact
        id: locate
        run: |
          VSIX="$(ls cdk-nag-validator-*.vsix | head -n1)"
          if [ -z "$VSIX" ]; then
            echo "::error::No VSIX produced by npm run package."
            exit 1
          fi
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with VSIX attached
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VSIX: ${{ steps.locate.outputs.vsix }}
        run: |
          gh release create "$TAG" "$VSIX" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VSIX: ${{ steps.locate.outputs.vsix }}
        run: |
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "::warning::VSCE_PAT secret not set — skipping Marketplace publish. The GitHub Release is still up."
            exit 0
          fi
          npx @vscode/vsce publish --packagePath "$VSIX" --pat "$VSCE_PAT"
