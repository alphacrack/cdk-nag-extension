name: CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Cancel outdated runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback — cheapest layer first. Any failure here fails the pipeline
  # and blocks merge via branch protection.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run lint

  # Build matrix across currently-supported Node versions. `compile` catches
  # TypeScript errors on every supported runtime.
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run compile

  # Fast, sandbox-focused unit tests (node:test runner).
  unit:
    name: Unit (node:test sandbox)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm test

  # Jest suite — VS Code API mocks, config defaults.
  jest:
    name: Unit (Jest)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run test:jest
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Functional tests — drive the compiled runner against CFN fixtures.
  # This is the regression gate for issue #4: if anyone rewrites the runner
  # in a way that stops emitting AwsSolutions-* findings, this fails.
  functional:
    name: Functional (runner + fixtures)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run test:functional

  # VS Code integration — activates the extension in a real VS Code process.
  # Needs a virtual display on headless Linux.
  integration:
    name: Integration (VS Code host)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Run integration tests under xvfb
        run: xvfb-run -a npm run test:integration

  # Aggregate gate: every upstream job must pass for this to pass. This is
  # the ONE required check to set in branch protection; it implicitly pulls
  # in all layers above. `if: always()` + explicit result check ensures a
  # cancelled or skipped upstream blocks instead of silently passing.
  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, build, unit, jest, functional, integration]
    if: always()
    steps:
      - name: Verify every upstream job succeeded
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS"
          echo "$RESULTS" | node -e '
            const r = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const failed = Object.entries(r).filter(([, v]) => v.result !== "success");
            if (failed.length) {
              console.error("BLOCK: the following jobs did not succeed:");
              for (const [name, v] of failed) console.error("  -", name, "=>", v.result);
              process.exit(1);
            }
            console.log("All upstream jobs succeeded — merge allowed.");
          '

  release:
    name: Release
    needs: all-checks-passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run package
      - name: Publish to VS Code Marketplace
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
